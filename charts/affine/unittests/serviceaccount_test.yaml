suite: test serviceaccount

templates:
  - serviceaccount.yaml
  - encryption-secret.yaml
  - database-secret.yaml

release:
  name: affine
  namespace: affine

chart:
  version: 1.0.0
  appVersion: 0.26.3

tests:
  # --- Created by default ------------------------------------------
  - it: should create a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
        template: serviceaccount.yaml

  - it: should name the ServiceAccount after the release by default
    asserts:
      - equal:
          path: metadata.name
          value: affine
        template: serviceaccount.yaml

  # --- Disabled ----------------------------------------------------
  - it: should not create a ServiceAccount when serviceAccount.create is false
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0
        template: serviceaccount.yaml

  # --- Custom name -------------------------------------------------
  - it: should use specified name when serviceAccount.name is set
    set:
      serviceAccount:
        create: true
        name: affine-custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: affine-custom-sa
        template: serviceaccount.yaml

  # --- Annotations -------------------------------------------------
  - it: should apply annotations when serviceAccount.annotations is set
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/affine-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789:role/affine-role
        template: serviceaccount.yaml
