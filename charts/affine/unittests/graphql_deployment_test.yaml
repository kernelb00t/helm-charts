suite: test graphql deployment

templates:
  - graphql/deployment.yaml
  - encryption-secret.yaml
  - database-secret.yaml

release:
  name: affine
  namespace: affine

chart:
  version: 1.0.0
  appVersion: 0.26.3

tests:
  # --- Replica count -----------------------------------------------
  - it: should have 1 replica by default
    asserts:
      - equal:
          path: spec.replicas
          value: 1
        template: graphql/deployment.yaml

  - it: should set replica count when graphql.replicaCount is set
    set:
      graphql:
        replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        template: graphql/deployment.yaml

  # --- Image -------------------------------------------------------
  - it: should use chart appVersion as image tag when tag is not set
    set:
      image:
        tag: ""
    chart:
      version: 1.0.0
      appVersion: 0.26.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/toeverything/affine:0.26.3
        template: graphql/deployment.yaml

  - it: should use specified tag when image.tag is set
    set:
      global:
        tag: "stable-0.26.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/toeverything/affine:stable-0.26.0
        template: graphql/deployment.yaml

  - it: should use digest format when image.digest is set
    set:
      global:
        digest: "sha256:abc123def456"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/toeverything/affine@sha256:abc123def456
        template: graphql/deployment.yaml

  - it: should override registry when global.registry is set
    set:
      global:
        registry: registry.example.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/toeverything/affine:0.26.3
        template: graphql/deployment.yaml

  - it: should set imagePullPolicy when image.pullPolicy is set
    set:
      global:
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        template: graphql/deployment.yaml

  # --- imagePullSecrets --------------------------------------------
  - it: should inject imagePullSecrets when global.imagePullSecrets is set
    set:
      global:
        imagePullSecrets:
          - name: my-registry-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-secret
        template: graphql/deployment.yaml

  # --- SERVER_FLAVOR -----------------------------------------------
  - it: should set SERVER_FLAVOR to graphql for graphql deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_FLAVOR
            value: "graphql"
        template: graphql/deployment.yaml

  # --- NODE_OPTIONS ------------------------------------------------
  - it: should set NODE_OPTIONS to max-old-space-size=2048 for graphql deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_OPTIONS
            value: "--max-old-space-size=2048"
        template: graphql/deployment.yaml

  # --- Application environment variables (_env.tpl) ----------------
  - it: should set NODE_ENV to production by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_ENV
            value: "production"
        template: graphql/deployment.yaml

  - it: should set NODE_ENV to canary when app.env is canary
    set:
      app:
        env: canary
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_ENV
            value: "canary"
        template: graphql/deployment.yaml

  - it: should set AFFINE_ENV to match app.env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_ENV
            value: "production"
        template: graphql/deployment.yaml

  - it: should set DEPLOYMENT_TYPE to selfhosted by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEPLOYMENT_TYPE
            value: "selfhosted"
        template: graphql/deployment.yaml

  - it: should set AFFINE_SERVER_HOST to 0.0.0.0 by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_SERVER_HOST
            value: "0.0.0.0"
        template: graphql/deployment.yaml

  - it: should set AFFINE_SERVER_HOST when app.host is set
    set:
      app:
        host: "my.affine.local"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_SERVER_HOST
            value: "my.affine.local"
        template: graphql/deployment.yaml

  - it: should set AFFINE_SERVER_PORT to 3010 by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_SERVER_PORT
            value: "3010"
        template: graphql/deployment.yaml

  - it: should inject AFFINE_SERVER_SUB_PATH when app.path is set
    set:
      app:
        path: "/affine"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_SERVER_SUB_PATH
            value: "/affine"
        template: graphql/deployment.yaml

  - it: should not have AFFINE_SERVER_SUB_PATH when app.path is empty
    set:
      app:
        path: ""
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_SERVER_SUB_PATH
        template: graphql/deployment.yaml

  - it: should inject AFFINE_SERVER_EXTERNAL_URL when app.externalUrl is set
    set:
      app:
        externalUrl: "https://affine.example.com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_SERVER_EXTERNAL_URL
            value: "https://affine.example.com"
        template: graphql/deployment.yaml

  - it: should set AFFINE_INDEXER_ENABLED to false by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_INDEXER_ENABLED
            value: "false"
        template: graphql/deployment.yaml

  - it: should set AFFINE_INDEXER_ENABLED to true and inject endpoint/provider when externalIndexer is enabled
    set:
      db:
        indexer:
          enabled: true
          endpoint: "http://manticoresearch:9308"
          provider: "manticoresearch"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_INDEXER_ENABLED
            value: "true"
        template: graphql/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_INDEXER_SEARCH_ENDPOINT
            value: "http://manticoresearch:9308"
        template: graphql/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_INDEXER_SEARCH_PROVIDER
            value: "manticoresearch"
        template: graphql/deployment.yaml

  # --- Database password secret ref --------------------------------
  - it: should read DATABASE_PASSWORD from affine-database secret by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: affine-database
                key: postgres-password
        template: graphql/deployment.yaml

  - it: should read DATABASE_PASSWORD from existingSecret when externalDatabase.existingSecret is set
    set:
      db:
        database:
          existingSecret: my-db-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-db-secret
                key: postgres-password
        template: graphql/deployment.yaml

  # --- Redis configuration -----------------------------------------
  - it: should set REDIS_SERVER_HOST to default value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_SERVER_HOST
            value: "redis-master"
        template: graphql/deployment.yaml

  - it: should set REDIS_SERVER_HOST when externalRedis.host is set
    set:
      db:
        redis:
          host: "my-redis"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_SERVER_HOST
            value: "my-redis"
        template: graphql/deployment.yaml

  - it: should set REDIS_SERVER_PORT to 6379 by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_SERVER_PORT
            value: "6379"
        template: graphql/deployment.yaml

  # --- Encryption private key secret ref ---------------------------
  - it: should read AFFINE_PRIVATE_KEY from affine-private-key secret by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: affine-private-key
                key: key
        template: graphql/deployment.yaml

  - it: should read AFFINE_PRIVATE_KEY from existingSecret when encryption.existingSecret is set
    set:
      encryption:
        existingSecret: my-encryption-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AFFINE_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: my-encryption-secret
                key: key
        template: graphql/deployment.yaml

  # --- DOC_SERVICE_ENDPOINT ----------------------------------------
  - it: should set DOC_SERVICE_ENDPOINT pointing to doc service
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DOC_SERVICE_ENDPOINT
            value: "http://affine-doc:3010"
        template: graphql/deployment.yaml

  # --- extraEnvVars ------------------------------------------------
  - it: should inject extra env vars when graphql.extraEnvVars is set
    set:
      graphql:
        extraEnvVars:
          - name: MY_CUSTOM_VAR
            value: "custom_value"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_VAR
            value: "custom_value"
        template: graphql/deployment.yaml

  # --- global.envVars ----------------------------------------------
  - it: should inject global env vars when global.envVars is set
    set:
      global:
        envVars:
          - name: GLOBAL_VAR
            value: "global_value"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GLOBAL_VAR
            value: "global_value"
        template: graphql/deployment.yaml

  # --- Ports -------------------------------------------------------
  - it: should set containerPort to 3010 by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3010
        template: graphql/deployment.yaml

  - it: should set containerPort when graphql.service.port is set
    set:
      graphql:
        service:
          port: 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
        template: graphql/deployment.yaml

  # --- Liveness / readiness probes ---------------------------------
  - it: should probe /info path for livenessProbe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /info
        template: graphql/deployment.yaml

  - it: should probe /info path for readinessProbe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /info
        template: graphql/deployment.yaml

  # --- Resources ---------------------------------------------------
  - it: should apply resource requests and limits when graphql.resources is set
    set:
      graphql:
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m
        template: graphql/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
        template: graphql/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "2"
        template: graphql/deployment.yaml

  # --- Security context --------------------------------------------
  - it: should apply pod-level security context when podSecurityContext is set
    set:
      podSecurityContext:
        fsGroup: 2000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
        template: graphql/deployment.yaml

  - it: should apply container-level security context when containerSecurityContext is set
    set:
      containerSecurityContext:
        runAsUser: 1001
        runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001
        template: graphql/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
        template: graphql/deployment.yaml

  # --- Pod annotations / labels ------------------------------------
  - it: should apply pod annotations when graphql.podAnnotations is set
    set:
      graphql:
        podAnnotations:
          prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
        template: graphql/deployment.yaml

  # --- ServiceAccount ----------------------------------------------
  - it: should use release-named ServiceAccount by default
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: affine
        template: graphql/deployment.yaml

  - it: should use custom ServiceAccount when serviceAccount.create is false and name is set
    set:
      serviceAccount:
        create: false
        name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa
        template: graphql/deployment.yaml

  # --- Persistence / VolumeMount -----------------------------------
  - it: should not have a data volumeMount when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
        template: graphql/deployment.yaml

  - it: should mount data volume when persistence is enabled
    set:
      persistence:
        enabled: true
        mountPath: /root/.affine
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /root/.affine
        template: graphql/deployment.yaml
