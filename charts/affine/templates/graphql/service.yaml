apiVersion: v1
kind: Service
metadata:
  name: {{ include "graphql.fullname" . }}
  labels:
    {{- include "graphql.labels" . | nindent 4 }}
spec:
  type: {{ .Values.graphql.service.type }}
  ports:
    - port: {{ .Values.graphql.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.graphql.service.nodePort }}
    - port: {{ .Values.graphql.service.nodePort }}
      targetPort: http
      protocol: TCP
      name: node-port
    {{- end }}
  selector:
    {{- include "graphql.selectorLabels" . | nindent 4 }}
