apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "doc.fullname" . }}-test-connection"
  labels:
    {{- include "doc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: "{{ .Values.global.imageRegistry }}/busybox"
      imagePullPolicy: IfNotPresent
      command: ['wget']
      args: ['{{ include "doc.fullname" . }}:{{ .Values.doc.service.port }}']
  restartPolicy: Never
