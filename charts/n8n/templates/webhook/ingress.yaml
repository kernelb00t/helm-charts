{{- if and .Values.webhook.ingress.enabled (eq .Values.db.type "postgresdb") (eq .Values.webhook.mode "queue") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-webhook" (include "n8n.names.fullname" .) }}
  labels:
    {{- include "n8n.labels.component" (dict "context" . "component" "webhook") | nindent 4 }}
  {{- with .Values.webhook.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.webhook.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.webhook.ingress.tls }}
  tls:
    {{- range .Values.webhook.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.webhook.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /webhook/
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-webhook" (include "n8n.names.fullname" $) }}
                port:
                  number: {{ $.Values.global.service.port }}
          - path: /form/
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-webhook" (include "n8n.names.fullname" $) }}
                port:
                  number: {{ $.Values.global.service.port }}
          - path: /webhook-waiting/
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-webhook" (include "n8n.names.fullname" $) }}
                port:
                  number: {{ $.Values.global.service.port }}
          - path: /form-waiting/
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-webhook" (include "n8n.names.fullname" $) }}
                port:
                  number: {{ $.Values.global.service.port }}
          {{- if $.Values.webhook.mcp.enabled }}
          - path: /mcp/
            pathType: Prefix
            backend:
              service:
                name: {{ include "n8n.mcp-webhook.serviceName" $ }}
                port:
                  number: {{ $.Values.global.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
