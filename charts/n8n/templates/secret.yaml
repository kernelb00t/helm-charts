{{- if and (eq .Values.db.type "postgresdb") (not .Values.db.postgresdb.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-postgresql
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  postgres-password: {{ .Values.db.postgresdb.password | b64enc | quote }}
{{- end }}
{{- if eq .Values.existingEncryptionKeySecret "" }}
{{- $oldSecretName := printf "%s-encryption-key-secret" (include "n8n.names.fullname" .) }}
{{- $newSecretName := printf "%s-encryption-key-secret-v2" (include "n8n.names.fullname" .) }}
{{- $existingOldSecret := lookup "v1" "Secret" .Release.Namespace $oldSecretName }}
{{- $existingNewSecret := lookup "v1" "Secret" .Release.Namespace $newSecretName }}
{{- $encryptionKey := "" }}
{{- if $existingOldSecret }}
{{- $encryptionKey = index $existingOldSecret.data "N8N_ENCRYPTION_KEY" | b64dec }}
{{- else if $existingNewSecret }}
{{- $encryptionKey = index $existingNewSecret.data "N8N_ENCRYPTION_KEY" | b64dec }}
{{- else }}
{{- $encryptionKey = ternary .Values.encryptionKey (include "n8n.generateRandomHex" 32) (ne .Values.encryptionKey "") }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $newSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
data:
  N8N_ENCRYPTION_KEY: {{ $encryptionKey | b64enc | quote }}
{{- end }}
{{- if and (eq .Values.worker.mode "queue") (not .Values.db.redis.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-redis
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  redis-username: {{ .Values.db.redis.username | default "default" | b64enc | quote }}
  redis-password: {{ .Values.db.redis.password | b64enc | quote }}
{{- end }}
{{- if eq .Values.taskRunners.mode "external" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-task-runners-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  auth-token: {{ default (include "n8n.generateRandomHex" 32) .Values.taskRunners.external.mainNodeAuthToken | b64enc | quote }}
  worker-auth-token: {{ default (include "n8n.generateRandomHex" 32) .Values.taskRunners.external.workerNodeAuthToken | b64enc | quote }}
{{- end }}
{{- if and .Values.license.enabled .Values.license.activationKey (not .Values.license.existingActivationKeySecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-license-activation-key
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  N8N_LICENSE_ACTIVATION_KEY: {{ .Values.license.activationKey | b64enc | quote }}
{{- end }}
{{- if and (has "s3" .Values.binaryData.availableModes) (not .Values.binaryData.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-s3-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  access-key-id: {{ .Values.binaryData.s3.accessKey | b64enc | quote }}
  secret-access-key: {{ .Values.binaryData.s3.accessSecret | b64enc | quote }}
{{- end }}
{{- if and .Values.npmRegistry.enabled .Values.npmRegistry.customNpmrc (not .Values.npmRegistry.secretName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-npm-registry-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  npmrc: {{ .Values.npmRegistry.customNpmrc | b64enc | quote }}
{{- end }}
{{- if and (eq .Values.db.type "postgresdb") .Values.db.postgresdb.ssl.enabled .Values.db.postgresdb.ssl.base64EncodedCertificateAuthorityFile (not .Values.db.postgresdb.ssl.existingCertificateAuthorityFileSecret.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-pg-ssl-ca
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  {{ default "ca.crt" .Values.db.postgresdb.ssl.existingCertificateAuthorityFileSecret.key }}: {{ .Values.db.postgresdb.ssl.base64EncodedCertificateAuthorityFile }}
{{- end }}
{{- if and (eq .Values.db.type "postgresdb") .Values.db.postgresdb.ssl.enabled .Values.db.postgresdb.ssl.base64EncodedCertFile (not .Values.db.postgresdb.ssl.existingCertFileSecret.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-pg-ssl-cert
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  {{ default "cert.crt" .Values.db.postgresdb.ssl.existingCertFileSecret.key }}: {{ .Values.db.postgresdb.ssl.base64EncodedCertFile }}
{{- end }}
{{- if and (eq .Values.db.type "postgresdb") .Values.db.postgresdb.ssl.enabled .Values.db.postgresdb.ssl.base64EncodedPrivateKeyFile (not .Values.db.postgresdb.ssl.existingPrivateKeyFileSecret.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.names.fullname" . }}-pg-ssl-key
  labels:
    {{- include "n8n.labels.standard" . | nindent 4 }}
type: Opaque
data:
  {{ default "cert.key" .Values.db.postgresdb.ssl.existingPrivateKeyFileSecret.key }}: {{ .Values.db.postgresdb.ssl.base64EncodedPrivateKeyFile }}
{{- end }}
