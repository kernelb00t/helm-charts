{{- if .Values.main.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "n8n.names.fullname" . }}
  labels:
    {{- include "n8n.labels.component" (dict "context" . "component" "main") | nindent 4 }}
  {{- with .Values.main.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.main.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.main.ingress.tls }}
  tls:
    {{- range .Values.main.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.main.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "n8n.names.fullname" $ }}
                port:
                  number: {{ $.Values.global.service.port }}
          {{- end }}
          - path: /rest/oauth2-credential/callback
            pathType: Prefix
            backend:
              service:
                name: {{ include "n8n.names.fullname" $ }}
                port:
                  number: {{ $.Values.global.service.port }}
          - path: /webhook-test/
            pathType: Prefix
            backend:
              service:
                name: {{ include "n8n.names.fullname" $ }}
                port:
                  number: {{ $.Values.global.service.port }}
          - path: /form-test/
            pathType: Prefix
            backend:
              service:
                name: {{ include "n8n.names.fullname" $ }}
                port:
                  number: {{ $.Values.global.service.port }}
          - path: /static/
            pathType: Prefix
            backend:
              service:
                name: {{ include "n8n.names.fullname" $ }}
                port:
                  number: {{ $.Values.global.service.port }}
    {{- end }}
{{- end }}
