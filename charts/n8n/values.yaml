  extraContainers: []
  affinity: {}
  hostAliases: []
  runtimeClassName: ""

# Webhook node configurations
webhook:
  # Use `regular` to use main node as webhook node, or use `queue` to have webhook nodes
  mode: regular
  # -- Webhook URL (include http/https schema).
  url: ""
  count: 2
  # If true, all k8s nodes will deploy exatly one webhook pod
  allNodes: false
  # MCP webhook configuration. This is only used when the webhook mode is set to `queue` and the database type is set to `postgresdb`.
  mcp:
    enabled: true
    resources: {}

    startupProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - ps aux | grep '[n]8n'
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 30

    livenessProbe:
