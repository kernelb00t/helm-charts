global:
  image:
    registry: docker.io
    pullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  securityContext: {}
  extraEnvVars: {}

  strategy:
    type: "RollingUpdate"
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"

  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    privileged: false
    runAsUser: 1000
    runAsGroup: 1000

  service:
    enabled: true
    type: ClusterIP
    port: 5678
    name: http
    annotations: {}
    labels: {}

  # n8n log configurations
  log:
    # -- Log level. Options: `error` \| `warn` \| `info` \| `debug`.
    level: info
    # -- Log output target. Options: `console` \| `file`.
    output:
      - console
    # Scopes to filter logs by. Nothing is filtered by default. Supported log scopes: concurrency, external-secrets, license, multi-main-setup, pubsub, redis, scaling, waiting-executions
    scopes: []
    file:
      # Location of the log files inside `~/.n8n`. Only for `file` log output.
      location: "logs/n8n.log"
      # The maximum size (in MB) for each log file. By default, n8n uses 16 MB.
      maxsize: 16
      # Max number of log files to keep, or max number of days to keep logs for. Once the limit is reached, the oldest log files will be rotated out. If using days, append a `d` suffix. Only for `file` log output.
      maxcount: "100"

nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

# Node configurations for built-in and external npm packages
nodes:
  # Enable built-in node functions (e.g., HTTP Request, Code Node, etc.)
  builtin:
    # Enable built-in modules for the Code node
    enabled: false
    # List of built-in Node.js modules to allow in the Code node (e.g., crypto, fs). Use '*' to allow all.
    modules: []
      # - crypto
      # - fs
    # Python standard library modules that you can use in the Code node. Use * to allow all stdlib modules.
    pythonStdlibAllow: ""
    # Python built-ins that you can't use in the Code node. Set to an empty string to allow all built-ins.
    pythonBuiltinsDeny: "eval,exec,compile,open,input,breakpoint,getattr,object,type,vars,setattr,delattr,hasattr,dir,memoryview,__build_class__,globals,locals"
    # Third-party Python modules that are allowed to be used in the Code node. Use * to allow all external modules.
    pythonExternalAllow: ""
  # External npm packages to install and allow in the Code node
  external:
    # -- Allow all external npm packages in Code node.
    allowAll: false
    # Whether to reinstall missing packages. For more information, see https://docs.n8n.io/integrations/community-nodes/troubleshooting/#error-missing-packages
    reinstallMissingPackages: false
    # Python standard library modules that you can use in the Code node. Use * to allow all stdlib modules.
    pythonStdlibAllow: ""
    # Python built-ins that you can't use in the Code node. Set to an empty string to allow all built-ins.
    pythonBuiltinsDeny: ""
    # Third-party Python modules that are allowed to be used in the Code node. Use * to allow all external modules.
    pythonExternalAllow: ""
    # List of npm package names and versions (e.g., "package-name@1.0.0")
    packages: []
      # - "moment@2.29.4"
      # - "lodash@4.17.21"
  initContainer:
    image:
      repository: node
      tag: "20-alpine"
      pullPolicy: IfNotPresent
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      # limits:
      #   cpu: 500m
      #   memory: 256Mi

# Configuration for private npm registry
npmRegistry:
  # Enable private npm registry
  enabled: false
  # URL of the private npm registry (e.g., https://registry.npmjs.org/)
  url: ""
  # Name of the Kubernetes secret containing npm registry credentials
  secretName: ""
  # Key in the secret for the .npmrc content or auth token
  secretKey: "npmrc"
  # Custom .npmrc content (optional, overrides secret if provided)
  customNpmrc: ""

# Configuration for binary data storage
binaryData:
  # Available modes of binary data storage. If not set, the default mode will be used. For more information, see https://docs.n8n.io/hosting/configuration/environment-variables/binary-data/
  availableModes: []
  # -- Binary data storage mode. Valid values: `default` (in-memory) \| `filesystem` \| `s3`.
  mode: "default"
  # Path for binary data storage in "filesystem" mode. If not set, the default path will be used. For more information, see https://docs.n8n.io/hosting/configuration/environment-variables/binary-data/
  localStoragePath: ""
  # S3-compatible external storage configurations. For more information, see https://docs.n8n.io/hosting/configuration/environment-variables/external-data-storage/
  s3:
    # -- S3-compatible storage host.
    host: ""
    # -- S3 bucket name.
    bucketName: ""
    # -- S3 bucket region.
    bucketRegion: "us-east-1"
    # -- S3 access key.
    accessKey: ""
    # -- S3 access secret.
    accessSecret: ""
    # -- Existing secret for S3 credentials (keys: `access-key-id`, `secret-access-key`).
    existingSecret: ""
    # Optional force path style for external object storage such as minIO
    # forcePathStyle: ""

# n8n database configurations
db:
  # Prefix to use for table names.
  tablePrefix: ""
  # -- Database engine. Valid values: `sqlite` \| `postgresdb`.
  type: sqlite

  sqlite:
    # SQLite database file name
    database: "database.sqlite"
    # SQLite database pool size. Set to `0` to disable pooling.
    poolSize: 0
    # Runs VACUUM operation on startup to rebuild the database. Reduces file size and optimizes indexes. This is a long running blocking operation and increases start-up time.
    vacuum: false

  postgresdb:
    # -- PostgreSQL server host
    host: ""
    # -- PostgreSQL username
    username: "postgres"
    # -- PostgreSQL password
    password: ""
    # -- PostgreSQL server port
    port: 5432
    # -- PostgreSQL database name.
    database: n8n
    # -- Existing secret with `postgres-password` key. Overrides `db.postgresdb.password`.
    existingSecret: ""
    # Control how many parallel open Postgres connections n8n should have. Increasing it may help with resource utilization, but too many connections may degrade performance.
    poolSize: 2
    # Postgres connection timeout (ms).
    connectionTimeout: 20000
    # Amount of time before an idle connection is eligible for eviction for being idle.
    idleConnectionTimeout: 30000
    # -- The PostgreSQL schema.
    schema: public
    # The PostgreSQL connection SSL settings. Find more information from here: https://docs.n8n.io/hosting/configuration/supported-databases-settings/#postgresdb
    ssl:
      # -- Whether to enable SSL.
      enabled: false
      # The PostgreSQL base64 encoded version of SSL certificate authority file content.
      base64EncodedCertificateAuthorityFile: ""
      # The PostgreSQL base64 encoded version of SSL certificate file content.
      base64EncodedCertFile: ""
      # The PostgreSQL base64 encoded version of SSL private key file content.
      base64EncodedPrivateKeyFile: ""
      existingCertificateAuthorityFileSecret:
        name: ""
        key: "ca.crt"
      existingCertFileSecret:
        name: ""
        key: "cert.crt"
      existingPrivateKeyFileSecret:
        name: ""
        key: "cert.key"
      rejectUnauthorized: true

  redis:
    # -- Redis database for Bull queue.
    database: 0
    # -- Redis server host
    host: ""
    # -- Redis username
    username: ""
    # -- Redis password
    password: ""
    # -- Redis server port
    port: 6379
    # -- Existing secret with `redis-password` key. Overrides `db.redis.password`.
    existingSecret: ""
    # List of Redis Cluster nodes. Setting this variable will create a Redis Cluster client instead of a Redis client, and n8n will ignore `db.redis.host` and `db.redis.port`.
    clusterNodes: []
      # - host: redis-1
      #   port: 6379
      # - host: redis-2
      #   port: 6379
    # Placeholder for future Redis TLS certificates
    tls:
      # Enable TLS on Redis connections.
      enabled: false
    # Enable dual-stack support (IPv4 and IPv6) on Redis connections.
    dualStack: false

  logging:
    enabled: false
    # Database logging level. Requires `maxQueryExecutionTime` to be higher than `0`. Valid values 'query' | 'error' | 'schema' | 'warn' | 'info' | 'log' | 'all'
    options: error
    # Only queries that exceed this time (ms) will be logged. Set `0` to disable.
    maxQueryExecutionTime: 0

sentry:
  enabled: false
  backendDsn: ""
  frontendDsn: ""
  externalTaskRunnersDsn: ""

diagnostics:
  enabled: false
  frontendConfig: "1zPn9bgWPzlQc0p8Gj1uiK6DOTn;https://telemetry.n8n.io"
  backendConfig: "1zPn7YoGC3ZXE9zLeTKLuQCB4F6;https://telemetry.n8n.io"
  postHog:
    apiKey: "phc_4URIAm1uYfJO7j8kWSe0J8lc8IqnstRLS7Jx8NcakHo"
    apiHost: "https://ph.n8n.io"

versionNotifications:
  enabled: false
  endpoint: "https://api.n8n.io/api/versions/"
  infoUrl: "https://docs.n8n.io/hosting/installation/updating/"

api:
  enabled: true
  path: api
  swagger:
    enabled: true

# n8n enterprise license configurations
license:
  # Whether to enable the enterprise license
  enabled: false
  # Activation key to initialize license. Not applicable if the n8n instance was already activated. For more information please refer to the following link: https://docs.n8n.io/enterprise-key/
  activationKey: ""
  # The name of an existing secret with license activation key. The secret must contain a key with the name N8N_LICENSE_ACTIVATION_KEY.
  existingActivationKeySecret: ""
  # The auto new license configuration
  autoNenew:
    # Enables (true) or disables (false) autorenewal for licenses. If disabled, you need to manually renew the license every 10 days by navigating to Settings > Usage and plan, and pressing F5. Failure to renew the license will disable Enterprise features.
    enabled: true
    # Time in hours before expiry a license should automatically renew.
    offsetInHours: 72
  # Server URL to retrieve license.
  serverUrl: "https://license.n8n.io/v1"
  # Tenant ID associated with the license. Only set this variable if explicitly instructed by n8n.
  tenantId: 1

# @section Main Node parameters
# Main node configurations
main:
  dnsPolicy: ClusterFirst
  dnsConfig: {}
  image:
    repository: n8nio/n8n
    tag: ""
    pullPolicy: IfNotPresent
  # Number of main nodes. Only enterprise license users can have one leader main node and mutiple follower main nodes.
  count: 1
  editorBaseUrl: ""
  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 2000m
  #   memory: 1Gi

  livenessProbe:
    httpGet:
      path: /healthz
      port: http

  readinessProbe:
    httpGet:
      path: /healthz/readiness
      port: http

  # Force to use statefulset for the main pod. If true, the main pod will be created as a statefulset.
  forceToUseStatefulset: false

  # Persistence configuration for the main pod
  persistence:
    enabled: false
    volumeName: ""
    existingClaim: ""
    mountPath: "/home/node/.n8n"
    subPath: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations:
      helm.sh/resource-policy: keep
    labels: {}

  extraEnvVars: {}
  extraSecretNamesForEnvFrom: []

  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  initContainers: []
  extraContainers: []
  affinity: {}
  hostAliases: []
  runtimeClassName: ""

  # HTTPRoute configuration for the main node (Gateway API)
  httpRoute:
    enabled: false
    # Hostnames for the HTTPRoute
    hostnames: []
    # parentRefs to attach the HTTPRoute to
    parentRefs: []
    # - name: ""
    #   namespace: ""
    #   group: gateway.networking.k8s.io
    #   kind: Gateway
    #   sectionName: ""
    # HTTPRoute annotations
    annotations: {}
    # HTTPRoute labels
    labels: {}

  # Ingress configuration for the main node
  ingress:
    # Enable Ingress resource
    enabled: false
    # Ingress class name
    className: ""
    # Ingress annotations
    annotations: {}
    # Ingress hosts
    hosts: []
    # - host: ""
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
    # Ingress TLS
    tls: []
    #  - secretName: ""
    #    hosts:
    #      - n8n.local

# Worker node configurations
worker:
  # Use `regular` to use main node as executer, or use `queue` to have worker nodes
  mode: regular
  concurrency: 10
  count: 2
  allNodes: false

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80

    # The behavior of the autoscaler.
    behavior: {}
      # scaleDown:
      #   stabilizationWindowSeconds: 300
      #   policies:
      #   - type: Percent
      #     value: 100
      #     periodSeconds: 15
      # scaleUp:
      #   stabilizationWindowSeconds: 0
      #   policies:
      #   - type: Percent
      #     value: 100
      #     periodSeconds: 15
      #   - type: Pods
      #     value: 4
      #     periodSeconds: 15
      #   selectPolicy: Max

  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: null

  waitMainNodeReady:
    enabled: false
    overwriteSchema: ""
    overwriteUrl: ""
    healthCheckPath: "/healthz"
    additionalParameters: []

  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 2000m
  #   memory: 1Gi

  startupProbe:
    exec:
      command:
        - /bin/sh
        - -c
        - ps aux | grep '[n]8n'
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

  livenessProbe:
    httpGet:
      path: /healthz
      port: http

  readinessProbe:
    httpGet:
      path: /healthz/readiness
      port: http

  forceToUseStatefulset: false

  # Persistence configuration for the worker pod
  persistence:
    enabled: false
    volumeName: ""
    existingClaim: ""
    mountPath: "/home/node/.n8n"
    subPath: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations:
      helm.sh/resource-policy: keep
    labels: {}

  extraEnvVars: {}
  extraSecretNamesForEnvFrom: []
  volumes: []
  # - name: foo
