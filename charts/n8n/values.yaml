# Task runners mode. Please follow the documentation for more information: https://docs.n8n.io/hosting/configuration/task-runners/
taskRunners:
  image:
    # -- Image registry. Overrides global.image.registry.
    registry: ""
    repository: n8nio/runners
    # -- Image pull policy.
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to chart appVersion).
    tag: ""
  # Use `internal` to use internal task runner, or use `external` to have external sidecar task runner. For more information please follow the documentation: https://docs.n8n.io/hosting/configuration/task-runners/#task-runner-modes
  mode: internal
  # The timeout for the task in seconds
  taskTimeout: 60
  # The heartbeat interval for the task in seconds
  taskHeartbeatInterval: 30
  # The maximum concurrency for the task
  maxConcurrency: 5
  # The maximum payload size in bytes for task runners
  maxPayload: "1073741824"
  # Block access to the runner's environment from within Python code tasks
  blockEnvAccess: true
  # Allow prototype mutation in the Code node (JavaScript)
  allowPrototypeMutation: false

  broker:
    address: "127.0.0.1"
    port: 5679

  # The configuration for the external task runner
  external:
    mainNodeAuthToken: ""
    workerNodeAuthToken: ""
    autoShutdownTimeout: 15
    port: 5680
    nodeOptions:
      - "--max-semi-space-size=16"
      - "--max-old-space-size=300"

    # The resources for the external task runner
    resources:
      requests:
        cpu: 100m
        memory: 32Mi
      limits:
        cpu: 2000m
        memory: 512Mi

# The workflow history configuration
workflowHistory:
  # Whether to save workflow history versions
  enabled: true
  # Time (in hours) to keep workflow history versions for. To disable it, use -1 as a value
  pruneTime: 336

# -- The base path under which n8n runs. Useful for serving n8n at a sub-path (e.g. /n8n/). Include a trailing slash.
# Maps to N8N_PATH environment variable.
n8nPath: "/"

# -- If you install n8n first time, you can keep this empty and it will be auto generated and never change again. If you already have a encryption key generated before, please use it here.
encryptionKey: ""

# -- The name of an existing secret with encryption key. The secret must contain a key with the name N8N_ENCRYPTION_KEY.
existingEncryptionKeySecret: ""

# For instance, the Schedule node uses it to know at what time the workflow should start. Find you timezone from here: https://momentjs.com/timezone/
timezone: "Europe/Berlin"

# A locale identifier, compatible with the Accept-Language header. n8n doesn't support regional identifiers, such as de-AT.
defaultLocale: en

# graceful shutdown timeout in seconds
gracefulShutdownTimeout: 30

# Security configurations for n8n. For more information see: https://docs.n8n.io/hosting/configuration/environment-variables/security/
security:
  # -- Whether to block access to the runner's environment from within Node.js code tasks.
  # Maps to N8N_BLOCK_ENV_ACCESS_IN_NODE. Default is false.
  blockEnvAccessInNode: false
  # -- Whether to block access to sensitive n8n files from within code nodes.
  # Maps to N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES. Default is true.
  blockFileAccessToN8nFiles: true
  # -- Semicolon-separated list of additional directories that code nodes are allowed to access.
  # Maps to N8N_RESTRICT_FILE_ACCESS_TO. Leave empty to use defaults.
  restrictFileAccessTo: ""
  # -- Whether to use secure cookies (HTTPS only). Set to false in HTTP-only environments.
  # Maps to N8N_SECURE_COOKIE. Default is true.
  secureCookie: true

# Workflow-related configurations. For more information see: https://docs.n8n.io/hosting/configuration/environment-variables/workflows/
workflows:
  # -- Whether to disable the onboarding flow for new users.
  # Maps to N8N_ONBOARDING_FLOW_DISABLED. Default is false.
  onboardingFlowDisabled: false
  # -- Number of workflows to activate in one batch during startup.
  # Maps to N8N_WORKFLOW_ACTIVATION_BATCH_SIZE. Default is 1.
  activationBatchSize: 1
  # -- Default caller policy for workflow-to-workflow calls.
  # Allowed values: any | none | workflowsFromAList | workflowsFromSameOwner.
  # Maps to N8N_WORKFLOW_CALLER_POLICY_DEFAULT_OPTION. Default is workflowsFromSameOwner.
  callerPolicyDefaultOption: "workflowsFromSameOwner"
  # -- Whether to disable the tags feature.
  # Maps to N8N_WORKFLOW_TAGS_DISABLED. Default is false.
  tagsDisabled: false
  # -- Default name for new workflows.
  # Maps to WORKFLOWS_DEFAULT_NAME. Default is "My workflow".
  defaultName: "My workflow"

# AI Assistant configurations
aiAssistant:
  # -- Base URL for the n8n AI Assistant backend.
  # Maps to N8N_AI_ASSISTANT_BASE_URL. Leave empty to use the default.
  baseUrl: ""

# The service monitor configuration. Please refer to the following link for more information: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/api-reference/api.md
serviceMonitor:
  # When set true then use a ServiceMonitor to configure scraping
  enabled: false
  # Set the namespace the ServiceMonitor should be deployed. If empty, the ServiceMonitor will be deployed in the same namespace as the n8n chart.
  namespace: ""
  # Set how frequently Prometheus should scrape
  interval: 30s
  # Set labels for the ServiceMonitor, use this to define your scrape label for Prometheus Operator
  labels:
    # default `kube prometheus stack` helm chart serviceMonitor selector label
    # Mostly it's your prometheus helm release name. Please find more information from here:
    # https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/platform/troubleshooting.md#troubleshooting-servicemonitor-changes
    release: prometheus
  # Set timeout for scrape
  timeout: 10s
  # Set of labels to transfer on the Kubernetes Service onto the target.
  targetLabels: []

  # Set of rules to relabel your exist metric labels
  metricRelabelings: []
    # - sourceLabels: [prometheus_replica]
    #   regex: (.*)
    #   targetLabel: another_prometheus_replica
    #   action: replace
    # - regex: prometheus_replica
    #   action: labeldrop

  # The prefix for the metrics
  metricsPrefix: "n8n_"

  # Whether to include metrics
  include:
    defaultMetrics: true
    cacheMetrics: false
    messageEventBusMetrics: false
    workflowIdLabel: false
    nodeTypeLabel: false
    credentialTypeLabel: false
    apiEndpoints: false
    apiPathLabel: false
    apiMethodLabel: false
    apiStatusCodeLabel: false
    queueMetrics: false