          cpu: 100m
          memory: 100Mi
        limits:
          cpu: 200m
          memory: 200Mi
  asserts:
  - equal:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].resources.requests.cpu
      value: 100m
    template: worker/statefulset.yaml
  - equal:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].resources.requests.memory
