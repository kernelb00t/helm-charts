        name: DB_POSTGRESDB_USER
        value: n8npostgres
    template: worker/statefulset.yaml
- it: should set postgresdb password environment variable from secret with key postgres-password
    when postgresql.enabled is true and db.postgresdb.password is set
  set:
    db:
      type: postgresdb
    db.postgresdb:
      username: n8npostgres
      password: n8npostgrespassword
  asserts:
  - contains:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].env
      content:
        name: DB_POSTGRESDB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: n8n-postgresql
            key: postgres-password
            optional: true
    template: worker/statefulset.yaml
- it: should set postgresdb password environment variable from secret with key postgres-password
