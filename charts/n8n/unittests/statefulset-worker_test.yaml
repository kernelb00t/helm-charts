    name: n8n
    namespace: n8n
  chart:
    version: 1.0.0
    appVersion: 1.0.0
  set:
    encryptionKey: test-encryption-key
    db:
      type: postgresdb
      postgresdb:
        ssl:
          enabled: true
          existingCertificateAuthorityFileSecret:
            name: my-ca-cert-secret
            key: root.crt
          existingCertFileSecret:
            name: my-client-cert-secret
            key: client.crt
          existingPrivateKeyFileSecret:
            name: my-client-cert-private-key-secret
            key: client.key
  asserts:
  - matchSnapshot: {}
- it: should configure python and general runner environment variables when set
  set:
    db:
      type: postgresdb
    worker:
      mode: queue
      count: 2
      autoscaling:
        enabled: false
      persistence:
        enabled: true
        accessMode: "ReadWriteOnce"
    taskRunners:
      mode: internal
      maxPayload: "200000000"
      blockEnvAccess: false
      allowPrototypeMutation: true
    nodes:
      builtin:
        pythonStdlibAllow: "math,json"
        pythonBuiltinsDeny: "eval"
      external:
        pythonExternalAllow: "requests"
  asserts:
  - contains:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].env
      content:
        name: N8N_RUNNERS_STDLIB_ALLOW
        value: "math,json"
      any: true
    template: worker/statefulset.yaml
  - contains:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].env
      content:
        name: N8N_RUNNERS_BUILTINS_DENY
        value: "eval"
      any: true
    template: worker/statefulset.yaml
  - contains:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].env
      content:
        name: N8N_RUNNERS_EXTERNAL_ALLOW
        value: "requests"
      any: true
    template: worker/statefulset.yaml
  - contains:
      path: spec.template.spec.containers[?(@.name == "n8n-worker")].env
