      path: spec.template.spec.containers[?(@.name == "n8n-mcp-webhook")].env
      content:
        name: DB_POSTGRESDB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: n8n-postgresql
            key: postgres-password
            optional: true
    template: mcp-webhook/deployment.yaml
- it: should set postgresdb password environment variable from secret with key postgres-password
