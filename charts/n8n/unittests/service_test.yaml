suite: test service

templates:
  - main/service.yaml
  - webhook/service.yaml
  - worker/service.yaml
  - mcp-webhook/service.yaml

release:
  name: n8n
  namespace: n8n
chart:
  version: 1.0.0
  appVersion: 1.0.0

tests:
  - it: should use different port number when we change it
    set:
      global.service:
        port: 80
    documentSelector:
      path: metadata.name
      value: n8n
    template: main/service.yaml
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: should use different port name when we change it
    set:
      global.service:
        name: differentname
    documentSelector:
      path: metadata.name
      value: n8n
    template: main/service.yaml
    asserts:
      - equal:
          path: spec.ports[0].name
          value: differentname

  - it: should create webhook service when db type is postgresdb and webhook.mode is queue and webhook.count is 1
    set:
      db:
        type: postgresdb
      webhook:
        count: 1
        mode: queue
      global.service:
        name: n8n-webhook
        port: 8080
    documentSelector:
      path: metadata.name
      value: n8n-webhook
    template: webhook/service.yaml
    asserts:
      - equal:
          path: spec.ports[0].name
          value: n8n-webhook
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: n8n-webhook

  - it: should create webhook service when db type is postgresdb and webhook.mode is queue and webhook.count is bigger than 1
    set:
      db:
        type: postgresdb
      webhook:
        count: 2
        mode: queue
    documentSelector:
      path: metadata.name
      value: n8n-mcp-webhook
    template: mcp-webhook/service.yaml
    asserts:
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 5678
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: should create headless service when main.forceToUseStatefulset is true
    set:
      main:
        forceToUseStatefulset: true
    documentSelector:
      path: metadata.name
      value: n8n-headless
    template: main/service.yaml
    asserts:
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: n8n
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: n8n
      - equal:
          path: spec.ports[0].port
          value: 5678
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].protocol
          value: TCP

