suite: test main httproute
templates:
  - main/httproute.yaml

release:
  name: n8n
  namespace: n8n

chart:
  version: 1.0.0
  appVersion: 1.0.0

tests:
  - it: should not create httproute when main.httpRoute.enabled is false
    set:
      main:
        httpRoute:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create httproute when main.httpRoute.enabled is true
    set:
      main:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          hostnames: ["n8n.example.com"]
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: HTTPRoute
      - equal:
          path: metadata.name
          value: n8n
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.hostnames[0]
          value: n8n.example.com

  - it: should route / to main service
    set:
      main:
        httpRoute:
          enabled: true
    asserts:
      - contains:
          path: spec.rules
          content:
            matches:
              - path: { type: PathPrefix, value: / }
            backendRefs:
              - name: n8n
                port: 5678
          any: true

  - it: should support parentRef with namespace and sectionName
    set:
      main:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: custom-gw-ns
              sectionName: websecure
    asserts:
      - equal:
          path: spec.parentRefs[0].namespace
          value: custom-gw-ns
      - equal:
          path: spec.parentRefs[0].sectionName
          value: websecure

  - it: should use custom hostnames
    set:
      main:
        httpRoute:
          enabled: true
          hostnames:
            - n8n.local
            - n8n.internal
    asserts:
      - equal:
          path: spec.hostnames
          value:
            - n8n.local
            - n8n.internal
