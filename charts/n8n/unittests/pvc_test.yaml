suite: test pvc

templates:
  - main/pvc.yaml

release:
  name: n8n
  namespace: n8n

chart:
  version: 1.0.0
  appVersion: 1.0.0

set:
  main:
    persistence:
      enabled: true
  worker:
    persistence:
      enabled: true

tests:
  # ─── Negative tests: PVC should not be created ────────────────────────────

  - it: should not create any PVC when existingClaim is set
    set:
      main:
        count: 1
        persistence:
          existingClaim: "test-existing-claim"
      worker:
        count: 1
        persistence:
          existingClaim: "test-existing-claim"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create main PVC when main.count > 1 and accessMode is ReadWriteOnce
    set:
      main:
        count: 2
        persistence:
          existingClaim: ""
          accessMode: ReadWriteOnce
      worker:
        count: 2
        persistence:
          existingClaim: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create main PVC when forceToUseStatefulset is true (worker PVC still exists)
    set:
      main:
        count: 1
        forceToUseStatefulset: true
        persistence:
          existingClaim: ""
          accessMode: ReadWriteOnce
      worker:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: n8n-worker

  # ─── Positive tests: PVC should be created correctly ──────────────────────

  - it: should create two PVCs (main + worker) when main.count=1 and accessMode=ReadWriteOnce
    set:
      main:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
          accessMode: ReadWriteOnce
      worker:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
    asserts:
      - hasDocuments:
          count: 2

  - it: main PVC name should be {release-name}-main
    set:
      main:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
          accessMode: ReadWriteOnce
      worker:
        count: 1
        persistence:
          enabled: false
    documentIndex: 0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: n8n-main
      - equal:
          path: kind
          value: PersistentVolumeClaim

  - it: main PVC should have correct component labels
    set:
      main:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
          accessMode: ReadWriteOnce
      worker:
        count: 1
        persistence:
          enabled: false
    documentIndex: 0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: main
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: n8n
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n

  - it: worker PVC name should be {release-name}-worker
    set:
      main:
        count: 1
        persistence:
          enabled: false
      worker:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
    documentIndex: 0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: n8n-worker
      - equal:
          path: kind
          value: PersistentVolumeClaim

  - it: worker PVC should have correct component labels
    set:
      main:
        count: 1
        persistence:
          enabled: false
      worker:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
    documentIndex: 0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: worker
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: n8n

  - it: main PVC should support custom storageClass and size
    set:
      main:
        count: 1
        persistence:
          enabled: true
          existingClaim: ""
          accessMode: ReadWriteOnce
          storageClass: "fast-ssd"
          size: "20Gi"
      worker:
        count: 1
        persistence:
          enabled: false
    documentIndex: 0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.storageClassName
          value: "fast-ssd"
      - equal:
          path: spec.resources.requests.storage
          value: "20Gi"

  - it: should create main PVC when main.count > 1 and accessMode is ReadWriteMany
    set:
      main:
        count: 3
        persistence:
          enabled: true
          existingClaim: ""
          accessMode: ReadWriteMany
      worker:
        count: 1
        persistence:
          enabled: false
    documentIndex: 0
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany
