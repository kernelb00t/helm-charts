app:
  externalUrl: "http://affine.local"
  host: "0.0.0.0"
  port: 3010
  https: false
  env: "production"
  logLevel: "log"

db:
  database:
    host: "pg-postgresql"
    port: 5432
    user: "postgres"
    database: "affine"
    password: "affine_pg_password"
  redis:
    host: "redis-master"
    port: 6379
    password: ""

front:
  replicaCount: 1
  resources:
    requests:
      cpu: "0.5"
      memory: "512Mi"
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - host: affine.local
        paths:
          - path: /graphql
            pathType: Prefix
          - path: /api
            pathType: Prefix
          - path: /
            pathType: Prefix

graphql:
  replicaCount: 1
  resources:
    requests:
      cpu: "0.5"
      memory: "512Mi"

doc:
  replicaCount: 1
  resources:
    requests:
      cpu: "0.2"
      memory: "256Mi"

persistence:
  enabled: false

podSecurityContext:
  fsGroup: 1001
